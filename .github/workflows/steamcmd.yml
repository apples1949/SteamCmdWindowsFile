name: SteamCMD Upload

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'

permissions:
  contents: write

jobs:
  build-steamcmd:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Create build directory
      run: mkdir -Force build | Out-Null
      shell: powershell

    - name: Download SteamCMD
      run: |
        $ProgressPreference = 'SilentlyContinue'
        Invoke-WebRequest -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" -OutFile steamcmd.zip
      shell: powershell

    - name: Extract SteamCMD
      run: Expand-Archive -Path steamcmd.zip -DestinationPath steamcmd
      shell: powershell

    - name: Initialize SteamCMD
      run: |
        $psi = New-Object System.Diagnostics.ProcessStartInfo
        $psi.FileName = "$pwd\steamcmd\steamcmd.exe"
        $psi.Arguments = "+quit"
        $psi.RedirectStandardOutput = $true
        $psi.UseShellExecute = $false
        $psi.CreateNoWindow = $true
        
        $process = New-Object System.Diagnostics.Process
        $process.StartInfo = $psi
        $process.Start() | Out-Null
        
        $exited = $process.WaitForExit(30000)
        if (-not $exited) {
            Write-Host "::warning::SteamCMD initialization timeout, force killing..."
            $process.Kill()
        }
        if (-not $process.HasExited) {
            $process.Kill()
            Start-Sleep -Seconds 3
        }
      shell: powershell

    - name: Terminate residual SteamCMD processes
      run: |
        Get-Process -Name steamcmd -ErrorAction SilentlyContinue | 
          Stop-Process -Force -ErrorAction SilentlyContinue
        Start-Sleep -Seconds 5
      shell: powershell

    - name: Cleanup directory
      run: |
        $logPath = "$pwd\steamcmd\logs"
        if (Test-Path $logPath) {
            Remove-Item $logPath -Recurse -Force -ErrorAction SilentlyContinue
        }
        
        Get-ChildItem -Path steamcmd | Where-Object { 
            $_.Name -ne "package" -and $_.Name -ne "steamcmd.exe" 
        } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
      shell: powershell

    - name: Create SteamCMD Zip
      run: |
        $zipPath = "$PWD\build\steamcmd.zip"
        if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
        }
        
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [IO.Compression.ZipFile]::CreateFromDirectory(
            "$PWD\steamcmd", 
            $zipPath, 
            [IO.Compression.CompressionLevel]::Optimal, 
            $false
        )
      shell: powershell

    - name: Create Package Zip
      run: |
        $pkgPath = "$PWD\build\package.zip"
        if (Test-Path $pkgPath) {
            Remove-Item $pkgPath -Force -ErrorAction SilentlyContinue
        }
        Compress-Archive -Path steamcmd\package\* -DestinationPath $pkgPath -Force
      shell: powershell

    - name: Commit and Push Files
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add build/steamcmd.zip build/package.zip
        git commit -m "Auto-update SteamCMD and Package [skip ci]"
        git pull --rebase
        git push origin HEAD:main
      shell: bash
