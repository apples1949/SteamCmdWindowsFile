name: SteamCMD Upload

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-steamcmd:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: true

    - name: Create build directory
      run: mkdir -Force build | Out-Null
      shell: powershell

    - name: Download SteamCMD
      run: |
        $ProgressPreference = 'SilentlyContinue'
        Invoke-WebRequest -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" -OutFile steamcmd.zip
      shell: powershell

    - name: Extract SteamCMD
      run: Expand-Archive -Path steamcmd.zip -DestinationPath steamcmd
      shell: powershell

    - name: Initialize SteamCMD
      run: |
        $psi = New-Object System.Diagnostics.ProcessStartInfo
        $psi.FileName = "$pwd\steamcmd\steamcmd.exe"
        $psi.Arguments = "+quit"
        $psi.RedirectStandardOutput = $true
        $psi.UseShellExecute = $false
        $psi.CreateNoWindow = $true
        
        $process = New-Object System.Diagnostics.Process
        $process.StartInfo = $psi
        $process.Start() | Out-Null
        
        if (-not $process.WaitForExit(15000)) {
            Write-Host "::warning::SteamCMD initialization timeout, continuing packaging..."
            $process.Kill()
            Start-Sleep -Seconds 1
        }
        
        if (-not $process.HasExited) {
            $process.Kill()
        }
      shell: powershell

    - name: Create Zip File
      run: |
        Add-Type -AssemblyName System.IO.Compression
        Add-Type -AssemblyName System.IO.Compression.FileSystem

        $excludePattern = '*siteserverui*'
        $sourceDir = "$PWD\steamcmd"
        $zipPath = "$PWD\build\steamcmd.zip"

        try {
            Get-ChildItem -Path $sourceDir -Recurse |
            Where-Object { $_.FullName -notlike $excludePattern } |
            Compress-Archive -DestinationPath $zipPath -Force -Update
        }
        catch {
            if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
            
            $archive = [System.IO.Compression.ZipFile]::Open(
                $zipPath,
                [System.IO.Compression.ZipArchiveMode]::Create
            )
            $archive.Dispose()

            $archive = [System.IO.Compression.ZipFile]::Open(
                $zipPath,
                [System.IO.Compression.ZipArchiveMode]::Update
            )

            Get-ChildItem $sourceDir -Recurse | ForEach-Object {
                if ($_.FullName -notlike $excludePattern) {
                    $entryName = $_.FullName.Substring($sourceDir.Length + 1)
                    [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
                        $archive,
                        $_.FullName,
                        $entryName,
                        [System.IO.Compression.CompressionLevel]::Optimal
                    )
                }
            }
            $archive.Dispose()
        }
        finally {
            if ($archive) { $archive.Dispose() }
        }
      shell: powershell

    - name: Pull File
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add build/steamcmd.zip
        git commit -m "Auto-build steamcmd [skip ci]"
        git pull --rebase
        git push origin HEAD:main
      shell: bash
