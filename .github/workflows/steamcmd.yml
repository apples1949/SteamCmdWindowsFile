name: SteamCMD Build Pipeline

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-steamcmd:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        persist-credentials: true  # 保持凭证用于后续推送

    - name: Create build directory
      run: New-Item -ItemType Directory -Path build -Force
      shell: powershell

    - name: Download SteamCMD
      run: |
        $url = "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip"
        Invoke-WebRequest -Uri $url -OutFile steamcmd.zip
      shell: powershell

    - name: Extract SteamCMD
      run: Expand-Archive -Path steamcmd.zip -DestinationPath steamcmd
      shell: powershell

    - name: Run SteamCMD (initialize)
      run: |
        timeout /t 15 /nobreak
        .\steamcmd\steamcmd.exe +quit 2>&1 | Out-Null
        exit 0
      shell: cmd
      continue-on-error: true  # 即使出错也继续执行后续步骤

    - name: Compress files
      run: |
        try {
            Compress-Archive -Path steamcmd\* -DestinationPath build/steamcmd.zip -Force
        } catch {
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            [System.IO.Compression.ZipFile]::CreateFromDirectory("$pwd\steamcmd", "$pwd\build\steamcmd.zip", [System.IO.Compression.CompressionLevel]::Optimal, $false)
        }
      shell: powershell


    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add build/steamcmd.zip
        git commit -m "Auto-update SteamCMD build"
        git push
      shell: bash
